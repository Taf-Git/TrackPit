<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#050810">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="TRACKPIT">
  <meta name="description" content="Seguimiento de vuelos en tiempo real. Busca por número de vuelo o matrícula.">
  <title>TRACKPIT</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">

  <style>
    /* ─── VARIABLES ─────────────────────────────────────────── */
    :root {
      --bg:        #050810;
      --bg-card:   #0a1422;
      --bg-surf:   #0f1e30;
      --blue:      #00aaff;
      --blue-dim:  rgba(0,170,255,0.15);
      --amber:     #f5a623;
      --amber-dim: rgba(245,166,35,0.15);
      --red:       #ff3b30;
      --red-dim:   rgba(255,59,48,0.13);
      --green:     #32d74b;
      --green-dim: rgba(50,215,75,0.13);
      --txt:       #c8e0f4;
      --txt-dim:   #3a6080;
      --border:    #142840;
      --glow-b:    0 0 18px rgba(0,170,255,0.25);
      --glow-a:    0 0 18px rgba(245,166,35,0.2);
    }

    /* ─── RESET & BASE ──────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html { height: 100%; }

    body {
      background: var(--bg);
      color: var(--txt);
      font-family: 'Share Tech Mono', monospace;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      overflow-x: hidden;
      padding-bottom: 2.5rem;
      /* Subtle vertical scanlines for CRT feel */
      background-image:
        repeating-linear-gradient(
          0deg,
          transparent 0px,
          transparent 3px,
          rgba(0,0,0,0.06) 3px,
          rgba(0,0,0,0.06) 4px
        );
    }

    /* ─── HEADER ────────────────────────────────────────────── */
    header {
      width: 100%;
      max-width: 500px;
      padding: 2.2rem 1.4rem 1.2rem;
      display: flex;
      align-items: center;
      gap: 0.8rem;
    }

    .logo-wrap { display: flex; flex-direction: column; }

    .logo-name {
      font-family: 'Orbitron', sans-serif;
      font-weight: 900;
      font-size: 1.55rem;
      letter-spacing: 0.25em;
      color: var(--blue);
      text-shadow: var(--glow-b);
      line-height: 1;
    }

    .logo-sub {
      font-size: 0.55rem;
      letter-spacing: 0.25em;
      color: var(--txt-dim);
      text-transform: uppercase;
      margin-top: 3px;
    }

    /* ─── SEARCH ────────────────────────────────────────────── */
    .search-section {
      width: 100%;
      max-width: 500px;
      padding: 0 1.4rem;
    }

    .search-lbl {
      display: block;
      font-size: 0.58rem;
      letter-spacing: 0.2em;
      color: var(--txt-dim);
      text-transform: uppercase;
      margin-bottom: 0.45rem;
    }

    .search-wrap {
      position: relative;
      display: flex;
      align-items: center;
    }

    .ico-search {
      position: absolute;
      left: 0.9rem;
      width: 18px;
      height: 18px;
      color: var(--txt-dim);
      pointer-events: none;
      transition: color 0.3s;
      flex-shrink: 0;
    }

    #inp {
      width: 100%;
      background: var(--bg-card);
      border: 1.5px solid var(--border);
      border-radius: 10px;
      color: var(--txt);
      font-family: 'Orbitron', sans-serif;
      font-size: 1.25rem;
      font-weight: 700;
      letter-spacing: 0.18em;
      padding: 0.95rem 3rem 0.95rem 2.8rem;
      outline: none;
      text-transform: uppercase;
      transition: border-color 0.3s, box-shadow 0.3s, background 0.3s;
      /* Tap highlight off on Android */
      -webkit-tap-highlight-color: transparent;
    }

    #inp::placeholder {
      color: var(--txt-dim);
      font-weight: 400;
      font-size: 0.95rem;
      letter-spacing: 0.1em;
    }

    #inp:focus {
      border-color: var(--blue);
      box-shadow: var(--glow-b), inset 0 0 24px rgba(0,170,255,0.04);
      background: #0c1830;
    }

    .search-wrap:focus-within .ico-search { color: var(--blue); }

    #btn-clear {
      position: absolute;
      right: 0.75rem;
      background: none;
      border: none;
      color: var(--txt-dim);
      cursor: pointer;
      font-size: 1.1rem;
      padding: 0.5rem;
      line-height: 1;
      display: none;
      -webkit-tap-highlight-color: transparent;
      transition: color 0.2s;
    }
    #btn-clear:active { color: var(--txt); }
    #btn-clear.on { display: block; }

    /* Scanner line */
    .scan {
      height: 2px;
      margin-top: 0.45rem;
      background: linear-gradient(90deg, transparent 0%, var(--blue) 50%, transparent 100%);
      border-radius: 2px;
      transform: scaleX(0);
      transform-origin: left;
      opacity: 0;
    }
    .scan.go {
      animation: scanner 0.65s cubic-bezier(0.4, 0, 0.2, 1) forwards;
    }
    @keyframes scanner {
      0%   { transform: scaleX(0); opacity: 0; }
      20%  { opacity: 1; }
      60%  { transform: scaleX(1); opacity: 1; }
      100% { transform: scaleX(1); opacity: 0; }
    }

    /* ─── RESULTS ───────────────────────────────────────────── */
    #results {
      width: 100%;
      max-width: 500px;
      padding: 1.4rem 1.4rem 0;
    }

    /* ── IDLE STATE ── */
    .idle {
      text-align: center;
      padding: 2.5rem 1rem;
      animation: fadeUp 0.4s ease;
    }

    .radar {
      width: 72px;
      height: 72px;
      margin: 0 auto 1.4rem;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .radar-ring {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      border: 1px solid var(--blue);
    }
    .radar-ring:nth-child(1) { animation: rpulse 2.6s 0s ease-out infinite; }
    .radar-ring:nth-child(2) { animation: rpulse 2.6s 1.3s ease-out infinite; }
    @keyframes rpulse {
      0%   { transform: scale(0.4); opacity: 0.7; }
      100% { transform: scale(1.6); opacity: 0; }
    }

    .idle-msg {
      font-size: 0.62rem;
      letter-spacing: 0.15em;
      color: var(--txt-dim);
      text-transform: uppercase;
      line-height: 2.2;
    }

    .chips-label {
      font-size: 0.52rem;
      letter-spacing: 0.18em;
      color: var(--txt-dim);
      text-transform: uppercase;
      margin: 1.2rem 0 0.5rem;
    }

    .chips { display: flex; flex-wrap: wrap; justify-content: center; gap: 0.4rem; }

    .chip {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 5px;
      padding: 0.3rem 0.65rem;
      font-family: 'Orbitron', sans-serif;
      font-size: 0.62rem;
      letter-spacing: 0.12em;
      color: var(--txt-dim);
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      transition: border-color 0.2s, color 0.2s;
      user-select: none;
    }
    .chip:active, .chip:hover {
      border-color: var(--blue);
      color: var(--blue);
    }

    /* ── NOT FOUND ── */
    .nf {
      text-align: center;
      padding: 3rem 1rem;
      animation: fadeUp 0.3s ease;
    }
    .nf-title {
      font-family: 'Orbitron', sans-serif;
      font-size: 0.75rem;
      letter-spacing: 0.15em;
      color: var(--txt-dim);
      margin-top: 1rem;
      margin-bottom: 0.4rem;
    }
    .nf-sub { font-size: 0.6rem; color: var(--txt-dim); opacity: 0.55; letter-spacing: 0.06em; line-height: 1.8; }

    /* ── FLIGHT CARD ── */
    .card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 14px;
      overflow: hidden;
      animation: fadeUp 0.4s cubic-bezier(0.16, 1, 0.3, 1);
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Card header */
    .c-head {
      background: var(--bg-surf);
      padding: 1rem 1.2rem;
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      border-bottom: 1px solid var(--border);
    }

    .c-fnum {
      font-family: 'Orbitron', sans-serif;
      font-size: 1.35rem;
      font-weight: 700;
      color: var(--blue);
      letter-spacing: 0.1em;
      text-shadow: var(--glow-b);
      line-height: 1;
    }

    .c-airline {
      font-size: 0.6rem;
      color: var(--txt-dim);
      letter-spacing: 0.1em;
      margin-top: 0.3rem;
    }

    /* Status badge */
    .badge {
      padding: 0.28rem 0.7rem;
      border-radius: 20px;
      font-size: 0.55rem;
      font-weight: 700;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      border: 1px solid;
      white-space: nowrap;
    }
    .b-route    { background: var(--blue-dim);  color: var(--blue);  border-color: rgba(0,170,255,0.35); }
    .b-land     { background: var(--green-dim); color: var(--green); border-color: rgba(50,215,75,0.35); }
    .b-board    { background: var(--amber-dim); color: var(--amber); border-color: rgba(245,166,35,0.35); }
    .b-cancel   { background: var(--red-dim);   color: var(--red);   border-color: rgba(255,59,48,0.35); }
    .b-sched    { background: rgba(58,96,128,0.15); color: var(--txt-dim); border-color: rgba(58,96,128,0.3); }
    .b-delay    { background: var(--red-dim);   color: var(--red);   border-color: rgba(255,59,48,0.35); }

    /* Route bar */
    .c-route {
      padding: 1.1rem 1.2rem;
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      gap: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    .ap-code {
      font-family: 'Orbitron', sans-serif;
      font-size: 1.7rem;
      font-weight: 700;
      color: var(--txt);
      letter-spacing: 0.04em;
      line-height: 1;
    }

    .ap-name {
      font-size: 0.56rem;
      color: var(--txt-dim);
      letter-spacing: 0.06em;
      margin-top: 0.3rem;
    }

    .ap-dest { text-align: right; }

    .arrow-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.2rem;
    }

    .arrow-line {
      width: 36px;
      height: 1px;
      background: linear-gradient(90deg, var(--border), var(--amber), var(--border));
    }

    .plane-fly {
      color: var(--amber);
      animation: floatplane 3s ease-in-out infinite;
      filter: drop-shadow(0 0 6px rgba(245,166,35,0.5));
    }
    @keyframes floatplane {
      0%, 100% { transform: translateX(-2px) translateY(0px); }
      50%       { transform: translateX(2px) translateY(-1px); }
    }

    /* ── DELAY BANNER ── */
    .delay-bar {
      background: var(--red-dim);
      border-bottom: 1px solid rgba(255,59,48,0.22);
      padding: 0.6rem 1.2rem;
      display: flex;
      align-items: center;
      gap: 0.6rem;
    }

    .delay-lbl {
      flex: 1;
      font-size: 0.58rem;
      letter-spacing: 0.15em;
      color: var(--red);
      text-transform: uppercase;
    }

    .delay-val {
      font-family: 'Orbitron', sans-serif;
      font-size: 1.05rem;
      font-weight: 700;
      color: var(--red);
      letter-spacing: 0.1em;
      text-shadow: 0 0 12px rgba(255,59,48,0.5);
    }

    /* ── TIMES GRID ── */
    .times {
      display: grid;
      grid-template-columns: 1fr 1fr;
      border-bottom: 1px solid var(--border);
    }

    .t-block {
      padding: 1rem 1.2rem;
    }
    .t-block:first-child { border-right: 1px solid var(--border); }

    .t-lbl {
      font-size: 0.53rem;
      letter-spacing: 0.18em;
      color: var(--txt-dim);
      text-transform: uppercase;
      margin-bottom: 0.35rem;
    }

    .t-val {
      font-family: 'Orbitron', sans-serif;
      font-size: 1.55rem;
      font-weight: 600;
      letter-spacing: 0.05em;
      line-height: 1;
    }
    .t-val.ok  { color: var(--txt); }
    .t-val.late { color: var(--red); text-shadow: 0 0 12px rgba(255,59,48,0.4); }

    .t-note {
      font-size: 0.57rem;
      color: var(--txt-dim);
      letter-spacing: 0.05em;
      margin-top: 0.3rem;
    }
    .t-note.late { color: rgba(255,59,48,0.6); }

    /* ── DETAILS GRID ── */
    .details {
      display: grid;
      grid-template-columns: 1fr 1fr;
    }

    .d-block {
      padding: 0.85rem 1.2rem;
      border-bottom: 1px solid var(--border);
    }
    .d-block:nth-child(odd)  { border-right: 1px solid var(--border); }
    .d-block:nth-last-child(-n+2) { border-bottom: none; }

    .d-lbl {
      font-size: 0.53rem;
      letter-spacing: 0.18em;
      color: var(--txt-dim);
      text-transform: uppercase;
      margin-bottom: 0.2rem;
    }

    .d-val {
      font-size: 0.82rem;
      color: var(--txt);
      letter-spacing: 0.05em;
      font-weight: 600;
    }
    .d-val.amber { color: var(--amber); }
    .d-val.dim   { color: var(--txt-dim); font-size: 0.68rem; font-weight: 400; }

    /* ── CARD FOOTER ── */
    .c-foot {
      padding: 0.65rem 1.2rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: rgba(0,0,0,0.2);
    }

    .c-src { font-size: 0.52rem; color: var(--txt-dim); letter-spacing: 0.1em; }
    .c-ts  { font-size: 0.52rem; color: var(--txt-dim); letter-spacing: 0.04em; }

    /* ─── INSTALL BANNER ───────────────────────────────────── */
    #install-wrap {
      width: 100%;
      max-width: 500px;
      padding: 0.75rem 1.4rem 0;
    }

    .install-bar {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      background: var(--bg-card);
      border: 1px solid rgba(245,166,35,0.3);
      border-radius: 10px;
      padding: 0.75rem 1rem;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      transition: border-color 0.2s;
    }
    .install-bar:active { border-color: var(--amber); }

    .install-txt { flex: 1; }
    .install-main { font-size: 0.62rem; color: var(--amber); letter-spacing: 0.08em; }
    .install-sub  { font-size: 0.54rem; color: var(--txt-dim); letter-spacing: 0.05em; margin-top: 0.2rem; }

    /* ─── SCROLLBAR ─────────────────────────────────────────── */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
  </style>
</head>
<body>

  <!-- ══ HEADER ══════════════════════════════════════════════ -->
  <header>
    <!-- Logo SVG: radar + plane -->
    <svg width="38" height="38" viewBox="0 0 38 38" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
      <circle cx="19" cy="19" r="17" stroke="#00aaff" stroke-width="1.2" opacity="0.35"/>
      <circle cx="19" cy="19" r="11" stroke="#00aaff" stroke-width="1" opacity="0.55"/>
      <line x1="19" y1="2"  x2="19" y2="8"  stroke="#00aaff" stroke-width="1.5" stroke-linecap="round"/>
      <line x1="19" y1="30" x2="19" y2="36" stroke="#00aaff" stroke-width="1.5" stroke-linecap="round"/>
      <line x1="2"  y1="19" x2="8"  y2="19" stroke="#00aaff" stroke-width="1.5" stroke-linecap="round"/>
      <line x1="30" y1="19" x2="36" y2="19" stroke="#00aaff" stroke-width="1.5" stroke-linecap="round"/>
      <!-- Plane arrow shape -->
      <path d="M19 12.5 L23 19 L19 17.5 L15 19 Z" fill="#f5a623"/>
      <path d="M15.5 21 L19 17.5 L22.5 21 L19 20 Z" fill="#f5a623" opacity="0.65"/>
      <rect x="17.5" y="20" width="3" height="3.5" rx="0.5" fill="#f5a623" opacity="0.5"/>
    </svg>
    <div class="logo-wrap">
      <div class="logo-name">TRACKPIT</div>
      <div class="logo-sub">Flight Intelligence</div>
    </div>
  </header>

  <!-- ══ INSTALL BANNER (se muestra si el navegador lo soporta) ══ -->
  <div id="install-wrap"></div>

  <!-- ══ SEARCH ═══════════════════════════════════════════════ -->
  <div class="search-section">
    <label class="search-lbl" for="inp">▸ Número de vuelo o matrícula</label>
    <div class="search-wrap">
      <!-- Search icon -->
      <svg class="ico-search" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" aria-hidden="true">
        <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
      <input
        type="text"
        id="inp"
        placeholder="VY1002 · EC-MYD"
        autocomplete="off"
        autocorrect="off"
        autocapitalize="characters"
        spellcheck="false"
        inputmode="text"
        aria-label="Número de vuelo o matrícula"
      >
      <button id="btn-clear" aria-label="Borrar búsqueda">✕</button>
    </div>
    <div class="scan" id="scan"></div>
  </div>

  <!-- ══ RESULTS ══════════════════════════════════════════════ -->
  <div id="results"></div>

  <!-- ══ SCRIPT ═══════════════════════════════════════════════ -->
  <script>
  'use strict';

  /* ═══════════════════════════════════════════════════════════
     ▼▼▼  ÚNICA LÍNEA QUE TIENES QUE TOCAR  ▼▼▼
     Pega aquí tu clave de RapidAPI / AeroDataBox
     ═══════════════════════════════════════════════════════════ */
  const RAPIDAPI_KEY = '9e5dfb284cmshef4d1a47600a8d0p12dc6bjsn021406a3fdc7';

  /* ═══════════════════════════════════════════════════════════
     TRADUCCIÓN DE ESTADOS (inglés API → español TRACKPIT)
     ═══════════════════════════════════════════════════════════ */
  const STATUS_MAP = {
    'Expected':          'PROGRAMADO',
    'EnRoute':           'EN RUTA',
    'CheckIn':           'CHECK-IN',
    'Boarding':          'EMBARCANDO',
    'GateClosed':        'PUERTA CERRADA',
    'Departed':          'EN RUTA',
    'Landed':            'ATERRIZADO',
    'Arrived':           'ATERRIZADO',
    'Cancelled':         'CANCELADO',
    'CanceledUncertain': 'CANCELADO',
    'Diverted':          'DESVIADO',
    'Unknown':           'DESCONOCIDO',
  };

  const BADGE_CLASS = {
    'EN RUTA':        'b-route',
    'ATERRIZADO':     'b-land',
    'EMBARCANDO':     'b-board',
    'CHECK-IN':       'b-board',
    'PUERTA CERRADA': 'b-board',
    'CANCELADO':      'b-cancel',
    'DESVIADO':       'b-cancel',
    'PROGRAMADO':     'b-sched',
    'DESCONOCIDO':    'b-sched',
  };

  /* ═══════════════════════════════════════════════════════════
     UTILIDADES DE TIEMPO
     Convierte "2024-06-15 14:30+02:00" → "14:30"
     ═══════════════════════════════════════════════════════════ */
  function fmtLocal(isoLocal) {
    if (!isoLocal) return '—';
    // Formato AeroDataBox: "2024-06-15 14:30+02:00"
    const m = isoLocal.match(/(\d{2}:\d{2})/);
    return m ? m[1] : '—';
  }

  /* ═══════════════════════════════════════════════════════════
     LLAMADA A LA API AERODATABOX
     Detecta automáticamente si es matrícula (EC-MYD)
     o número de vuelo (VY1002)
     ═══════════════════════════════════════════════════════════ */
  const IS_REG = /^[A-Z]{1,2}-[A-Z0-9]{2,5}$/;   // patrón matrícula: EC-MYD, G-EUUU...

  async function fetchFlight(query) {
    const q = query.trim().toUpperCase().replace(/\s/g, '');
    const isReg = IS_REG.test(q);

    // Endpoint diferente según sea matrícula o número de vuelo
    const endpoint = isReg
      ? `https://aerodatabox.p.rapidapi.com/flights/reg/${q}?withAircraftImage=false&withLocation=false`
      : `https://aerodatabox.p.rapidapi.com/flights/number/${q}?withAircraftImage=false&withLocation=false`;

    const response = await fetch(endpoint, {
      method: 'GET',
      headers: {
        'X-RapidAPI-Key':  RAPIDAPI_KEY,
        'X-RapidAPI-Host': 'aerodatabox.p.rapidapi.com',
      },
    });

    if (response.status === 404) return null;         // vuelo no encontrado
    if (response.status === 401) throw new Error('API_KEY');
    if (!response.ok) throw new Error(`HTTP_${response.status}`);

    const data = await response.json();

    // La API devuelve un array; cogemos el vuelo más relevante
    // (el que está en curso o el más próximo)
    const flights = Array.isArray(data) ? data : (data.flights || []);
    if (!flights.length) return null;

    // Ordenamos: primero en ruta, luego embarcando, luego por hora de salida
    const PRIORITY = ['EnRoute','Departed','Boarding','GateClosed','CheckIn','Expected','Landed','Arrived'];
    flights.sort((a, b) => {
      const pa = PRIORITY.indexOf(a.status);
      const pb = PRIORITY.indexOf(b.status);
      if (pa !== pb) return (pa === -1 ? 99 : pa) - (pb === -1 ? 99 : pb);
      return 0;
    });

    return normalize(flights[0], q);
  }

  /* ═══════════════════════════════════════════════════════════
     NORMALIZACIÓN
     Convierte la respuesta cruda de AeroDataBox a nuestro
     formato interno (el mismo que usaba el mock)
     ═══════════════════════════════════════════════════════════ */
  function normalize(f, originalQuery) {
    const dep = f.departure || {};
    const arr = f.arrival   || {};
    const ac  = f.aircraft  || {};
    const al  = f.airline   || {};

    const schDep = fmtLocal(dep.scheduledTime?.local);
    const actDep = fmtLocal(dep.actualTime?.local);
    const schArr = fmtLocal(arr.scheduledTime?.local);
    const estArr = fmtLocal(arr.estimatedTime?.local || arr.actualTime?.local);

    const depDelay = dep.delay || 0;
    const arrDelay = arr.delay || 0;
    const delay    = depDelay || arrDelay || 0;

    const statusRaw = f.status || 'Unknown';
    const status    = STATUS_MAP[statusRaw] || statusRaw.toUpperCase();

    // Puerta: intentamos salida, si no llegada
    const gate = dep.gate || arr.gate || dep.terminal || arr.terminal || '—';

    return {
      flightNumber: f.number || originalQuery,
      airline:      al.name  || '—',
      registration: ac.reg   || '—',
      aircraft:     ac.model || '—',
      origin: {
        code: dep.airport?.iata || dep.airport?.icao || '???',
        name: dep.airport?.name || '—',
      },
      destination: {
        code: arr.airport?.iata || arr.airport?.icao || '???',
        name: arr.airport?.name || '—',
      },
      schDep,
      actDep: actDep !== '—' ? actDep : null,
      chocks:  actDep !== '—' ? actDep : null,
      schArr,
      estArr: estArr !== '—' ? estArr : schArr,
      status,
      delay,
      gate,
    };
  }

  /* ═══════════════════════════════════════════════════════════
     RENDERIZADO
     ═══════════════════════════════════════════════════════════ */
  function renderFlight(f) {
    const hasDelay = f.delay > 0;
    const depTime  = f.chocks || f.actDep || f.schDep;
    const depLate  = !!(f.actDep && f.actDep !== f.schDep);
    const arrLate  = !!(f.estArr && f.estArr !== f.schArr);
    const ts       = new Date().toLocaleTimeString('es-ES', { hour:'2-digit', minute:'2-digit' });

    return `
    <div class="card">
      <div class="c-head">
        <div>
          <div class="c-fnum">${f.flightNumber}</div>
          <div class="c-airline">${f.airline}</div>
        </div>
        <span class="badge ${BADGE_CLASS[f.status] || 'b-sched'}">${f.status}</span>
      </div>

      <div class="c-route">
        <div>
          <div class="ap-code">${f.origin.code}</div>
          <div class="ap-name">${f.origin.name}</div>
        </div>
        <div class="arrow-wrap">
          <div class="arrow-line"></div>
          <svg class="plane-fly" width="22" height="22" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
            <path d="M21 16v-2l-8-5V3.5c0-.83-.67-1.5-1.5-1.5S10 2.67 10 3.5V9l-8 5v2l8-2.5V19l-2 1.5V22l3.5-1 3.5 1v-1.5L13 19v-5.5l8 2.5z"/>
          </svg>
          <div class="arrow-line"></div>
        </div>
        <div class="ap-dest">
          <div class="ap-code">${f.destination.code}</div>
          <div class="ap-name">${f.destination.name}</div>
        </div>
      </div>

      ${hasDelay ? `
      <div class="delay-bar">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" style="color:var(--red);flex-shrink:0" aria-hidden="true">
          <circle cx="12" cy="12" r="10"/>
          <line x1="12" y1="8" x2="12" y2="13"/>
          <circle cx="12" cy="16" r="0.5" fill="currentColor"/>
        </svg>
        <span class="delay-lbl">Retraso estimado</span>
        <span class="delay-val">+${f.delay} MIN</span>
      </div>` : ''}

      <div class="times">
        <div class="t-block">
          <div class="t-lbl">⬆ Calzos · Salida real</div>
          <div class="t-val ${depLate || hasDelay ? 'late' : 'ok'}">${depTime}</div>
          <div class="t-note ${depLate ? 'late' : ''}">
            ${depTime !== f.schDep ? `Prog. ${f.schDep}` : 'En hora ✓'}
          </div>
        </div>
        <div class="t-block">
          <div class="t-lbl">⬇ Llegada estimada</div>
          <div class="t-val ${arrLate ? 'late' : 'ok'}">${f.estArr}</div>
          <div class="t-note ${arrLate ? 'late' : ''}">
            ${f.estArr !== f.schArr ? `Prog. ${f.schArr}` : 'En hora ✓'}
          </div>
        </div>
      </div>

      <div class="details">
        <div class="d-block">
          <div class="d-lbl">Matrícula</div>
          <div class="d-val amber">${f.registration}</div>
        </div>
        <div class="d-block">
          <div class="d-lbl">Puerta</div>
          <div class="d-val amber">${f.gate}</div>
        </div>
        <div class="d-block">
          <div class="d-lbl">Aeronave</div>
          <div class="d-val">${f.aircraft}</div>
        </div>
        <div class="d-block">
          <div class="d-lbl">Fuente</div>
          <div class="d-val dim">AeroDataBox</div>
        </div>
      </div>

      <div class="c-foot">
        <span class="c-src">▸ TRACKPIT v2.0</span>
        <span class="c-ts">Actualizado ${ts}</span>
      </div>
    </div>`;
  }

  function renderLoading(q) {
    return `
    <div class="idle" style="padding:2rem 1rem">
      <div class="radar">
        <div class="radar-ring"></div>
        <div class="radar-ring"></div>
        <svg width="22" height="22" viewBox="0 0 24 24" fill="#00aaff" opacity="0.5" aria-hidden="true">
          <path d="M21 16v-2l-8-5V3.5c0-.83-.67-1.5-1.5-1.5S10 2.67 10 3.5V9l-8 5v2l8-2.5V19l-2 1.5V22l3.5-1 3.5 1v-1.5L13 19v-5.5l8 2.5z"/>
        </svg>
      </div>
      <div class="idle-msg">Buscando <strong style="color:var(--blue)">${q.toUpperCase()}</strong>…</div>
    </div>`;
  }

  function renderIdle() {
    return `
    <div class="idle">
      <div class="radar">
        <div class="radar-ring"></div>
        <div class="radar-ring"></div>
        <svg width="22" height="22" viewBox="0 0 24 24" fill="#00aaff" opacity="0.5" aria-hidden="true">
          <path d="M21 16v-2l-8-5V3.5c0-.83-.67-1.5-1.5-1.5S10 2.67 10 3.5V9l-8 5v2l8-2.5V19l-2 1.5V22l3.5-1 3.5 1v-1.5L13 19v-5.5l8 2.5z"/>
        </svg>
      </div>
      <div class="idle-msg">Introduce un vuelo<br>para comenzar el seguimiento</div>
      <div class="chips-label">Prueba con vuelos reales</div>
      <div class="chips">
        <button class="chip" onclick="tryFlight('VY1234')">VY1234</button>
        <button class="chip" onclick="tryFlight('IB3456')">IB3456</button>
        <button class="chip" onclick="tryFlight('VY6200')">VY6200</button>
        <button class="chip" onclick="tryFlight('FR1234')">FR1234</button>
        <button class="chip" onclick="tryFlight('U21234')">U21234</button>
      </div>
    </div>`;
  }

  function renderNotFound(q) {
    return `
    <div class="nf">
      <svg width="38" height="38" viewBox="0 0 24 24" fill="none" stroke="var(--txt-dim)" stroke-width="1.3" opacity="0.4" aria-hidden="true">
        <circle cx="11" cy="11" r="8"/>
        <line x1="21" y1="21" x2="16.65" y2="16.65"/>
        <line x1="8.5" y1="8.5" x2="13.5" y2="13.5" stroke-width="2"/>
        <line x1="13.5" y1="8.5" x2="8.5" y2="13.5" stroke-width="2"/>
      </svg>
      <div class="nf-title">Vuelo no encontrado</div>
      <div class="nf-sub">"${q.toUpperCase()}" no figura en los datos de hoy.<br>Comprueba el número o prueba con la matrícula.</div>
    </div>`;
  }

  function renderError(type) {
    const msg = type === 'API_KEY'
      ? 'Clave de API no válida.<br>Revisa el archivo index.html.'
      : 'Error de red. Comprueba tu conexión<br>e inténtalo de nuevo.';
    return `
    <div class="nf">
      <svg width="38" height="38" viewBox="0 0 24 24" fill="none" stroke="var(--red)" stroke-width="1.3" opacity="0.5" aria-hidden="true">
        <circle cx="12" cy="12" r="10"/>
        <line x1="12" y1="8" x2="12" y2="13" stroke-width="2"/>
        <circle cx="12" cy="16.5" r="0.7" fill="var(--red)"/>
      </svg>
      <div class="nf-title" style="color:var(--red)">Error de conexión</div>
      <div class="nf-sub">${msg}</div>
    </div>`;
  }

  /* ═══════════════════════════════════════════════════════════
     LÓGICA DE INTERACCIÓN
     ═══════════════════════════════════════════════════════════ */
  const inp      = document.getElementById('inp');
  const results  = document.getElementById('results');
  const btnClear = document.getElementById('btn-clear');
  const scanEl   = document.getElementById('scan');

  let timer = null;

  function triggerScan() {
    scanEl.classList.remove('go');
    void scanEl.offsetWidth;
    scanEl.classList.add('go');
  }

  async function doSearch(q) {
    if (!q.trim()) { results.innerHTML = renderIdle(); return; }
    triggerScan();
    results.innerHTML = renderLoading(q);
    try {
      const flight = await fetchFlight(q);
      results.innerHTML = flight ? renderFlight(flight) : renderNotFound(q);
    } catch (err) {
      results.innerHTML = renderError(err.message);
    }
  }

  // Búsqueda mientras escribe (debounced 600ms — la API es red, no local)
  inp.addEventListener('input', () => {
    const v = inp.value;
    btnClear.classList.toggle('on', v.length > 0);
    clearTimeout(timer);
    if (v.length === 0) { results.innerHTML = renderIdle(); return; }
    // Esperamos al menos 5 caracteres para no gastar llamadas API
    if (v.length >= 5) { timer = setTimeout(() => doSearch(v), 600); }
  });

  // Enter confirma búsqueda inmediata
  inp.addEventListener('keydown', e => {
    if (e.key === 'Enter') {
      clearTimeout(timer);
      doSearch(inp.value);
      inp.blur();
    }
  });

  // Botón borrar
  btnClear.addEventListener('click', () => {
    inp.value = '';
    btnClear.classList.remove('on');
    results.innerHTML = renderIdle();
    inp.focus();
  });

  // Chips de ejemplo
  function tryFlight(code) {
    inp.value = code;
    btnClear.classList.add('on');
    doSearch(code);
    results.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }
  window.tryFlight = tryFlight;

  // Estado inicial
  results.innerHTML = renderIdle();

  /* ═══════════════════════════════════════════════════════════
     PWA: INSTALL PROMPT
     ═══════════════════════════════════════════════════════════ */
  let deferredPrompt = null;

  window.addEventListener('beforeinstallprompt', e => {
    e.preventDefault();
    deferredPrompt = e;

    const wrap = document.getElementById('install-wrap');
    wrap.innerHTML = `
      <div class="install-bar" id="install-btn" role="button" tabindex="0">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="var(--amber)" stroke-width="1.8" aria-hidden="true">
          <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 14l-4-4h2.5V9h3v3H16l-4 4z"/>
        </svg>
        <div class="install-txt">
          <div class="install-main">▸ Instalar TRACKPIT en tu dispositivo</div>
          <div class="install-sub">Sin Play Store · Acceso desde pantalla de inicio</div>
        </div>
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="var(--amber)" stroke-width="2" aria-hidden="true">
          <path d="m9 18 6-6-6-6"/>
        </svg>
      </div>`;

    document.getElementById('install-btn').addEventListener('click', async () => {
      if (!deferredPrompt) return;
      deferredPrompt.prompt();
      const { outcome } = await deferredPrompt.userChoice;
      if (outcome === 'accepted') wrap.innerHTML = '';
      deferredPrompt = null;
    });
  });

  /* ═══════════════════════════════════════════════════════════
     PWA: SERVICE WORKER
     ═══════════════════════════════════════════════════════════ */
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('./sw.js')
        .catch(() => {});
    });
  }
  </script>
</body>
</html>
